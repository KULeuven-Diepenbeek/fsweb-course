<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaflet Kaart - Hogescholen Diepenbeek</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem 2rem;
        }

        header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        header p {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        main {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        #kaart {
            height: 500px;
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .controls {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .controls button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            background-color: #2c3e50;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }

        .controls button:hover {
            background-color: #3d5166;
        }

        .info-box {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: white;
            border-left: 4px solid #2c3e50;
            border-radius: 4px;
            font-size: 0.9rem;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
            min-height: 2.5rem;
        }

        .info-box span {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

<header>
    <h1>Leaflet Kaart — Hogescholen in Diepenbeek</h1>
    <p>Markers op UHasselt, UCLL en PXL in Diepenbeek. Klik op de kaart of een marker voor meer info.</p>
</header>

<main>
    <div id="kaart"></div>

    <div class="controls">
        <button onclick="flyNaar('uhasselt')">Zoom naar UHasselt</button>
        <button onclick="flyNaar('ucll')">Zoom naar UCLL</button>
        <button onclick="flyNaar('pxl')">Zoom naar PXL</button>
        <button onclick="kaart.flyToBounds(driehoek.getBounds(), { padding: [40, 40] })">Toon driehoek</button>
        <button onclick="zoomNaarGebruiker()" style="background-color: #c0392b;">📍 Mijn locatie</button>
    </div>

    <div class="info-box" id="info">
        <span>Klik ergens op de kaart om de coördinaten te zien...</span>
    </div>
</main>

<script>
    // ------------------------------------------------------------------
    // Coördinaten van de drie campussen
    // ------------------------------------------------------------------
    const locaties = {
        uhasselt: { latlng: [50.92544226134486, 5.392236200091248], naam: 'UHasselt', info: 'Universiteit Hasselt<br>Agoralaan Gebouw D, 3590 Diepenbeek' },
        ucll:     { latlng: [50.92893379263277, 5.395375800431507], naam: 'UCLL',     info: 'UC Leuven-Limburg<br>Agoralaan Gebouw B, 3590 Diepenbeek' },
        pxl:      { latlng: [50.92788749805288, 5.385541994768053], naam: 'PXL',      info: 'Hogeschool PXL<br>Agoralaan Gebouw H, 3590 Diepenbeek' }
    };

    // ------------------------------------------------------------------
    // 1. Kaart aanmaken: gecentreerd op UHasselt Diepenbeek
    // ------------------------------------------------------------------
    const kaart = L.map('kaart').setView(locaties.uhasselt.latlng, 15);

    // ------------------------------------------------------------------
    // 2. Tile layer toevoegen (OpenStreetMap)
    // ------------------------------------------------------------------
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19
    }).addTo(kaart);

    // ------------------------------------------------------------------
    // 3. Markers voor de drie campussen
    // ------------------------------------------------------------------
    const markerUHasselt = L.marker(locaties.uhasselt.latlng).addTo(kaart);
    markerUHasselt
        .bindPopup('<b>' + locaties.uhasselt.naam + '</b><br>' + locaties.uhasselt.info)
        .openPopup();

    const markerUCLL = L.marker(locaties.ucll.latlng).addTo(kaart);
    markerUCLL.bindPopup('<b>' + locaties.ucll.naam + '</b><br>' + locaties.ucll.info);

    const markerPXL = L.marker(locaties.pxl.latlng).addTo(kaart);
    markerPXL.bindPopup('<b>' + locaties.pxl.naam + '</b><br>' + locaties.pxl.info);

    // ------------------------------------------------------------------
    // 4. Driehoek tussen de drie campussen
    // ------------------------------------------------------------------
    const driehoek = L.polygon([
        locaties.uhasselt.latlng,
        locaties.ucll.latlng,
        locaties.pxl.latlng
    ], {
        color: '#2c3e50',
        fillColor: '#2980b9',
        fillOpacity: 0.15,
        weight: 2,
        dashArray: '6, 4'
    }).addTo(kaart);
    driehoek.bindPopup('Driehoek: UHasselt — UCLL — PXL');

    // ------------------------------------------------------------------
    // 5. Gebruikerslocatie (rode marker)
    // ------------------------------------------------------------------
    const roodIcoon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });

    let gebruikersMarker = null;
    let nauwkeurigheidsCirkel = null;

    function zoomNaarGebruiker() {
        if (!navigator.geolocation) {
            toonInfo('Geolocatie wordt niet ondersteund door deze browser.');
            return;
        }
        navigator.geolocation.getCurrentPosition(
            function (positie) {
                const lat = positie.coords.latitude;
                const lng = positie.coords.longitude;
                const nauwkeurigheid = positie.coords.accuracy;

                // Verwijder vorige marker/cirkel indien aanwezig
                if (gebruikersMarker) kaart.removeLayer(gebruikersMarker);
                if (nauwkeurigheidsCirkel) kaart.removeLayer(nauwkeurigheidsCirkel);

                gebruikersMarker = L.marker([lat, lng], { icon: roodIcoon })
                    .addTo(kaart)
                    .bindPopup('📍 <b>Jouw locatie</b><br>Nauwkeurigheid: ~' + Math.round(nauwkeurigheid) + ' m')
                    .openPopup();

                nauwkeurigheidsCirkel = L.circle([lat, lng], {
                    radius: nauwkeurigheid,
                    color: '#c0392b',
                    fillColor: '#c0392b',
                    fillOpacity: 0.1,
                    weight: 1
                }).addTo(kaart);

                kaart.flyTo([lat, lng], 16);
                toonInfo('Jouw locatie gevonden: ' + lat.toFixed(5) + ', ' + lng.toFixed(5) + ' (~' + Math.round(nauwkeurigheid) + ' m nauwkeurig)');
            },
            function (fout) {
                toonInfo('Locatie kon niet worden bepaald: ' + fout.message);
            }
        );
    }

    // ------------------------------------------------------------------
    // 6. Hulpfunctie voor zoom-knoppen
    // ------------------------------------------------------------------
    function flyNaar(sleutel) {
        const loc = locaties[sleutel];
        kaart.flyTo(loc.latlng, 16);
        toonInfo('Ingezoomd op ' + loc.naam);
    }

    // ------------------------------------------------------------------
    // 5. Klik-event op de kaart
    // ------------------------------------------------------------------
    kaart.on('click', function (event) {
        const lat = event.latlng.lat.toFixed(5);
        const lng = event.latlng.lng.toFixed(5);

        L.popup()
            .setLatLng(event.latlng)
            .setContent('📍 Coördinaten:<br><b>' + lat + ', ' + lng + '</b>')
            .openOn(kaart);

        toonInfo('Geklikte coördinaten: lat = ' + lat + ', lng = ' + lng);
    });

    // ------------------------------------------------------------------
    // Helper: info-box bijwerken
    // ------------------------------------------------------------------
    function toonInfo(tekst) {
        document.getElementById('info').innerHTML = tekst;
    }
</script>

</body>
</html>
